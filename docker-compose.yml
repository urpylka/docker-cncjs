version: "3.5"
volumes:
    serialport:
services:
    cncjs:
        image: urpylka/cncjs:latest
        restart: unless-stopped
        volumes:
            - serialport:/serialport
        ports:
            - 80:80
    socat:
        build:
            context: ./socat
            dockerfile: Dockerfile
        restart: unless-stopped
        environment:
            IP_OF_ESP8266: 192.168.11.204
        volumes:
            - serialport:/serialport
